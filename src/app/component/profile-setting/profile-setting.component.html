<div class="card">
  <div class="bg-corner tl"></div>
  <div class="bg-corner br"></div>

  <!-- NAV -->
  <nav>
    <div class="logo">
        <div class="app-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="85" height="85" viewBox="0 0 85 85">
                <!-- Nền bong bóng chat -->
                <path
                    d="M42.5 2C20.3 2 2 18.5 2 38.2c0 8.5 3.8 16.3 10.2 22.4L8 82l17.8-8.1c5.3 2 10.8 3 16.7 3 22.2 0 40.5-16.5 40.5-36.7C83 18.5 64.7 2 42.5 2z"
                    fill="#1877f2" />

                <!-- Logo chữ M -->
                <g transform="translate(0,85) scale(0.1,-0.1)" fill="#ffffff">
                    <path d="M203 681 c-17 -11 -37 -29 -42 -40 -7 -12 -11 -101 -11 -230 0 -227
        0 -228 51 -201 18 10 19 23 19 213 1 170 3 199 14 185 7 -10 44 -76 82 -148
        67 -125 70 -130 101 -130 37 0 39 2 142 180 l61 105 0 -188 0 -188 26 -24 c15
        -14 31 -25 35 -25 5 0 9 103 9 230 l0 230 -39 26 c-22 14 -48 24 -57 22 -11
        -2 -49 -56 -94 -131 -87 -148 -69 -150 -163 18 -68 120 -80 129 -134 96z" />
                </g>
            </svg>
        </div>
    </div>
    <ul class="nav-links">
      <li><a href="home">Home</a></li>
      <li><a href="chat">Chat</a></li>
      <li><a href="friends">Friends</a></li>
      <li><a class="active" href="settings">Settings</a></li>
    </ul>
    <button class="btn-solid" (click)="logout()">Log out</button>
  </nav>

  <!-- BODY -->
  <div class="body">

    <!-- LEFT: Profile Card -->
    <div class="profile-card">
      <div class="avatar-ring">
        <div class="avatar">
          <img src="{{linkAvatar}}" alt="{{userName}}" />
        </div>
        <button class="avatar-edit" (click)="editAvatar()">✏️</button>
        <input
          #avatarInput
          type="file"
          accept="image/*"
          hidden
          (change)="editAvatar($event)"
        />
      </div>
      <h2 class="profile-name">{{ userName }}</h2>

      <!-- Sidebar menu -->
      <ul class="side-menu">
        <li class="side-item" [class.active]="selectedTab === 'personal'" (click)="selectTab('personal')">
          <span class="side-icon">👤</span>
          <span>Personal Info</span>
        </li>
        <li class="side-item" [class.active]="selectedTab === 'privacy'" (click)="selectTab('privacy')">
          <span class="side-icon">🔒</span>
          <span>Privacy & Security</span>
        </li>
      </ul>
    </div>

    <!-- RIGHT: Settings Form -->
    <div class="settings-panel">

      <div class="panel-header">
        <div>
          <h1>PROFILE<span>SETTINGS</span></h1>
          <p>Update your personal information and preferences below.</p>
        </div>
      </div>

      <div class="section-label" *ngIf="selectedTab === 'personal'">Personal Information</div>
      <div class="section-label" *ngIf="selectedTab === 'privacy'">Privacy & Security</div>

      <div *ngIf="selectedTab === 'personal'">
        <form class="form-grid" [formGroup]="profileForm" (ngSubmit)="saveChanges()">
          <div class="form-group">
            <label>Username</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" formControlName="username" [value]="this.userName" />
            </div>
          </div>
          <div>
            <label>Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">✉️</span>
              <input type="email" [value]="this.email" readonly/>
            </div>
          </div>
        </form>

        <div class="form-actions">
          <button class="btn-cancel" (click)="cancel()">Cancel</button>
          <button class="btn-cta" (click)="saveChanges()">Save Changes <span class="arrow">→</span></button>
        </div>
      </div>

      <div *ngIf="selectedTab === 'privacy'">
        <form [formGroup]="changePasswordForm" class="form-grid" (ngSubmit)="changePassword()">
          <div class="form-group">
            <label>Current Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input formControlName="currentPassword" type="password" placeholder="Enter current password" />
            </div>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔑</span>
              <input formControlName="newPassword" type="password" placeholder="Enter new password" />
            </div>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔑</span>
              <input formControlName="confirmPassword" type="password" placeholder="Confirm new password" />
            </div>
          </div>
        </form>

        <div class="form-actions">
          <button class="btn-cancel" (click)="cancel()">Cancel</button>
          <button class="btn-cta" (click)="changePassword()">Save Password <span class="arrow">→</span></button>
        </div>
      </div>
    </div>
  </div>
</div>
