  <div class="bg-corner tl"></div>
  <div class="bg-corner br"></div>

                    fill="#1877f2" />

                <!-- Logo chữ M -->
                <g transform="translate(0,85) scale(0.1,-0.1)" fill="#ffffff">
                    <path d="M203 681 c-17 -11 -37 -29 -42 -40 -7 -12 -11 -101 -11 -230 0 -227
        0 -228 51 -201 18 10 19 23 19 213 1 170 3 199 14 185 7 -10 44 -76 82 -148
        67 -125 70 -130 101 -130 37 0 39 2 142 180 l61 105 0 -188 0 -188 26 -24 c15
        -14 31 -25 35 -25 5 0 9 103 9 230 l0 230 -39 26 c-22 14 -48 24 -57 22 -11

        </div>
    </div>
    <ul class="nav-links">
      <li><a href="home">Home</a></li>
      <li><a href="chat">Chat</a></li>
      <li><a href="friends">Friends</a></li>
      <li><a href="settings">Settings</a></li>
    </ul>
    <button class="btn-solid" (click)="logout()">Log out</button>
  </nav>

  <!-- BODY -->
  <div class="body">

    <!-- LEFT: Profile Card -->
    <div class="profile-card">
      <div class="avatar-ring">
        <div class="avatar">
          <span>JD</span>
        </div>
        <button class="avatar-edit">✏️</button>
      </div>
      <h2 class="profile-name">James Dawson</h2>

      <!-- Sidebar menu -->
      <ul class="side-menu">
        <li class="side-item active">
          <span class="side-icon">👤</span>
          <span>Personal Info</span>
        </li>
        <li class="side-item">
          <span class="side-icon">🔒</span>
          <span>Privacy & Security</span>
        </li>
        <li class="side-item">
          <span class="side-icon">🔔</span>
          <span>Notifications</span>
        </li>
        <li class="side-item">
          <span class="side-icon">🎨</span>
          <span>Appearance</span>
        </li>
      </ul>
    </div>

    <!-- RIGHT: Settings Form -->
    <div class="settings-panel">

      <div class="panel-header">
        <div>
          <h1>PROFILE<span>SETTINGS</span></h1>
          <p>Update your personal information and preferences below.</p>
        </div>
      </div>

      <!-- Section: Personal Info -->
      <div class="section-label">Personal Information</div>

      <div class="form-grid">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" value="James" />
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" value="james.dawson@email.com" />
          </div>
        </div>
      </div>

      <!-- Section: Bio -->
      <div class="section-label">About Me</div>
      <div class="form-group full-width">
        <div class="input-wrap textarea-wrap">
          <textarea rows="3" placeholder="Write something about yourself...">Product Designer based in New York. Passionate about great UI and human-centered design.</textarea>
        </div>
      </div>

      <!-- Section: Password -->
      <div class="section-label">Change Password</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Current Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" value="••••••••" />
          </div>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" placeholder="Enter new password" />
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn-cancel">Cancel</button>
        <button class="btn-cta">Save Changes <span class="arrow">→</span></button>
      </div>
    </div>
  </div>
</div>
