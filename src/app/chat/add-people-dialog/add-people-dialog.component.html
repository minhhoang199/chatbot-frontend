<!-- backdrop -->
<div class="ap-backdrop">
  <!-- modal -->
  <div class="ap-modal" role="dialog" aria-modal="true" aria-label="Add people">
    <header class="ap-header">
      <h3>Add People</h3>
      <button class="btn-ghost" (click)="closePopup()" aria-label="Close">✕</button>
    </header>

    <div class="ap-body">
      <!-- search -->
      <label class="field">
        <input type="search" placeholder="Search by email..."   
        [(ngModel)]="searchEmail"
        (keyup)="onSearch()"
        (keypress)="onKeyPress($event)"/>
      </label>

      <!-- list header -->
      <div class="list-header">
        <div class="selected-count">{{ selectedPeople.length }} selected</div>
      </div>

      <!-- selected list -->
      <div class="contact-list" role="list">
        <div *ngFor="let user of selectedPeople" class="contact-row" (click)="toggleSelect(user)" [class.selected]="isSelected(user)">
          <label class="contact-inner" (click)="$event.stopPropagation()">
            <input type="checkbox" (click)="toggleSelect(user); $event.stopPropagation()" [checked]="isSelected(user)"/>
            <div class="avatar">
              <img src="assets/avatar.png" alt="{{user.username}}" />
            </div>
            <div class="meta">
              <div class="name">{{ user.username }}</div>
              <div class="subtitle" *ngIf="user.email">{{ user.email }}</div>
            </div>
          </label>
        </div>
      </div>

      <!-- search results -->
      <div class="list-header">
        <div class="selected-count">Search Results</div>
      </div>

      <!-- contact list -->
      <div class="contact-list" role="list">
        <div *ngFor="let user of searchResult" class="contact-row" (click)="toggleSelect(user)" [class.selected]="isSelected(user)">
          <label class="contact-inner" (click)="$event.stopPropagation()">
            <input type="checkbox" (click)="toggleSelect(user); $event.stopPropagation()" [checked]="isSelected(user)"/>
            <div class="avatar">
              <img src="assets/avatar.png" alt="{{user.username}}" />
            </div>
            <div class="meta">
              <div class="name">{{ user.username }}</div>
              <div class="subtitle" *ngIf="user.email">{{ user.email }}</div>
            </div>
          </label>
        </div>

        <!-- no results -->
        <div class="no-result" *ngIf="searchResult.length === 0">No matching results</div>
      </div>
    </div>

    <footer class="ap-footer">
      <button class="btn-outline" (click)="closePopup()">Cancel</button>
      <button class="btn-primary" [disabled]="selectedPeople.length < 1" (click)="addPeople()">Add People</button>
    </footer>
  </div>
</div>
