<div class="chat-item-container">
  <div class="chat-item" [class.active]="active" [class.has-unread]="unreadCount > 0">
    <img src="{{linkAvatar}}" alt="{{roomName}}" class="chat-avatar">
    <div class="chat-info">
      <div class="chat-name">{{roomName}}</div>
      <div class="chat-preview"><span>{{room.lastMessageContent}}</span></div>
    </div>
    <span *ngIf="unreadCount > 0" class="unread-badge">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
    <!-- <div class="online-indicator"></div> -->
  </div>
</div>
