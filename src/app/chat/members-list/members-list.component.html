<!-- backdrop -->
<div class="cg-backdrop">
  <!-- modal -->
  <div class="cg-modal" role="dialog" aria-modal="true" aria-label="Create group">
    <header class="cg-header">
      <h3>Members</h3>
      <button class="btn-ghost" (click)="closePopup()" aria-label="Close">✕</button>
    </header>

    <div class="cg-body">
      <!-- search -->
      <label class="field">
        <input type="search" placeholder="Search by email..."   
        [(ngModel)]="searchEmail"
        (ngModelChange)="onSearchChange()"/>
      </label>

      <!-- list header -->
      <div class="list-header">
        <div class="selected-count">{{ selectedMembers.length }} selected</div>
      </div>

      <!-- contact list -->
      <div class="member-list" role="list">
        <div *ngFor="let user of filteredMembers" class="member-row" (click)="toggleSelect(user)" [class.selected]="isSelected(user)">
          <label class="contact-inner" (click)="$event.stopPropagation()">
            <input type="checkbox" (click)="toggleSelect(user); $event.stopPropagation()" [checked]="isSelected(user)"/>
            <div class="avatar">
              <img src="assets/avatar.png" alt="{{user.username}}" />
            </div>
            <div class="meta">
              <div class="name">{{ user.username }}</div>
              <div class="subtitle" *ngIf="user.email">{{ user.email }}</div>
            </div>
          </label>
        </div>

        <!-- no results -->
        <div class="no-result" *ngIf="filteredMembers.length === 0">No matching results</div>
      </div>
    </div>

    <footer class="cg-footer">
      <button class="btn-outline" (click)="closePopup()">Cancel</button>
      <button class="btn-primary" [disabled]="selectedMembers.length === 0" (click)="removeMember()">Remove members</button>
    </footer>
  </div>
</div>
