    <div class="profile-container" (click)="toggleProfileMenu($event)">

        <img src="assets/avatar.png" alt="Profile">
      </button>
      <div class="profile-menu" *ngIf="profileMenuOpen" (click)="$event.stopPropagation()">
        <div class="profile-menu-inner">
          <div class="profile-menu-header">
            <img src="assets/avatar.png" class="profile-menu-avatar" alt="Profile">
            <div class="profile-menu-info">
              <div class="profile-menu-name">{{username}}</div>
              <button class="profile-menu-see" type="button">See all profiles</button>
            </div>
          </div>
          <ul class="profile-menu-list">

            <li><button type="button" class="pm-btn">Display &amp; accessibility</button></li>
